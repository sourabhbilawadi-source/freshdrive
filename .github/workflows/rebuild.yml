name: Scheduled Rebuild

on:
  schedule:
    # Trigger a rebuild once daily at 00:00 UTC (5:30 AM IST)
    - cron: '0 0 * * *'
  workflow_dispatch: # Allow manual triggering from GitHub Actions tab

jobs:
  deploy:
    name: Trigger Cloudflare Deployment
    runs-on: ubuntu-latest
    steps:
      - name: Send Deploy Hook Request
        run: |
          if [ -z "${{ secrets.CLOUDFLARE_PAGES_DEPLOY_HOOK }}" ]; then
            echo "❌ Error: CLOUDFLARE_PAGES_DEPLOY_HOOK secret is missing."
            exit 1
          fi
          curl -s -X POST "${{ secrets.CLOUDFLARE_PAGES_DEPLOY_HOOK }}"
          echo "✅ Cloudflare build triggered successfully."
